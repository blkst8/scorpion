# docker-compose.test.yml
# Minimal Redis-only stack for running e2e tests on the host.
# The e2e test suite starts its own in-process Scorpion instance;
# all it needs is Redis reachable at localhost:6379.
#
# Usage:
#   sudo docker compose -f docker-compose.test.yml up -d
#   go test -v -count=1 ./test/e2e/... -timeout 5m
#   sudo docker compose -f docker-compose.test.yml down
version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: scorpion-test-redis
    restart: unless-stopped
    ports:
      - "6379:6379"        # exposed to host for the test suite
    command: >
      redis-server
      --save ""
      --appendonly no
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  emqx:
    image: emqx/emqx:5.8.6
    container_name: scorpion-test-emqx
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT/TCP  – used by benchmark clients
      - "8083:8083"   # MQTT/WS   – optional
      - "18083:18083" # EMQX dashboard (admin / public)
    environment:
      EMQX_NODE__NAME: "emqx@127.0.0.1"
      # EMQX 5.x: set authentication list to empty → all connections are anonymous.
      EMQX_AUTHENTICATION: "[]"
      # Raise per-process socket limits inside the container.
      EMQX_NODE__MAX_PORTS: "2097152"
      # Increase TCP listener connection ceiling (default is already high but be explicit).
      EMQX_LISTENERS__TCP__DEFAULT__MAX_CONNECTIONS: "1048576"
      EMQX_MQTT__MAX_CLIENTID_LEN: "128"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    sysctls:
      net.core.somaxconn: 32768
      net.ipv4.tcp_max_syn_backlog: 16384
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

